<!DOCTYPE html>
<html lang="en">
    <head>
         <title>Student Result System</title>
    </head>
    <body>
        <h1>student result system</h1>
        <p>welcome to student result system </p>
        <form action="http://127.0.0.1:8000/show_result" method="post">
            <label for="name">name:</label>
            <input type="text" id="name" name="name"><br><br>
            <label for="rollno">rollno:</label>
            <input type="number" id="rollno" name="rollno"><br><br>
            <label for="student_class">class:</label>
            <input type="number" id="student_class" name="student_class"><br><br>
            <label for="english_mark">english mark:</label>
            <input type="number" id="english_mark" name="english_mark"><br><br>
            <label for="hindi_mark">hindi mark:</label>
            <input type="number" id="hindi_mark" name="hindi_mark"><br><br>
            <label for="science_mark">science mark:</label>
            <input type="number" id="science_mark" name="science_mark"><br><br>
            <label for="maths_mark">maths mark:</label>
            <input type="number" id="maths_mark" name="maths_mark"><br><br>
            <label for="sst_mark">sst mark:</label>
            <input type="number" id="sst_mark" name="sst_mark"><br><br>
            <button type="submit">Calculate Result</button>

            </form>


    </body>
</html>
